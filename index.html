<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي امتحان GitHub Foundations</title>
    <style>
        :root {
            --primary: #0969da;
            --bg-color: #f6f8fa;
            --text-main: #24292f;
            --box-bg: #ffffff;
            --border: #d0d7de;
            --success: #2da44e;
            --danger: #cf222e;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--box-bg); padding: 30px; border-radius: 6px; border: 1px solid var(--border); box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .info-text { text-align: center; font-size: 14px; color: #57606a; margin-bottom: 20px; }
        #quiz-container { display: none; }
        .progress-bar { width: 100%; background-color: #e1e4e8; border-radius: 3px; height: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease; }
        .question-header { font-size: 14px; color: #57606a; margin-bottom: 10px; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; text-align: left; direction: ltr; }
        .options { display: flex; flex-direction: column; gap: 10px; direction: ltr; }
        .option { padding: 12px 15px; background: #f6f8fa; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 15px; text-align: left; }
        .option:hover { background: #eaeef2; }
        .option.selected { background: #ddf4ff; border-color: var(--primary); }
        .option.correct { background: #dcffe4; border-color: var(--success); }
        .option.wrong { background: #ffebe9; border-color: var(--danger); }
        .btn { display: inline-block; padding: 10px 20px; font-size: 16px; font-weight: 600; color: #fff; background-color: var(--success); border: 1px solid rgba(27,31,36,0.15); border-radius: 6px; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.2s; }
        .btn:hover { background-color: #2c974b; }
        .btn:disabled { background-color: #94d3a2; cursor: not-allowed; }
        .explanation { margin-top: 15px; padding: 15px; background: #ddf4ff; border-left: 4px solid var(--primary); border-radius: 4px; display: none; text-align: left; direction: ltr; font-size: 14px; }
        #result-container { display: none; text-align: center; }
        .score { font-size: 48px; font-weight: bold; margin: 20px 0; color: var(--primary); }
        .pass { color: var(--success); }
        .fail { color: var(--danger); }
        #start-screen { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>GitHub Foundations (GH-900)</h1>
    
    <div id="start-screen">
        <p class="info-text">مرحباً بك في المحاكي الشامل. تم إعداد 60 سؤالاً نارياً تغطي كافة مجالات الامتحان مع تركيز خاص على نقاط الضعف المتقدمة.</p>
        <button class="btn" onclick="startQuiz()">ابدأ التحدي الآن</button>
    </div>

    <div id="quiz-container">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div class="question-header" id="question-count">السؤال 1 من 60</div>
        <div class="question-text" id="question-text"></div>
        <div class="options" id="options"></div>
        <div class="explanation" id="explanation"></div>
        <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>تأكيد الإجابة</button>
    </div>

    <div id="result-container">
        <h2>اكتمل التحدي!</h2>
        <p>نتيجتك النهائية هي:</p>
        <div class="score" id="score"></div>
        <p id="result-message"></p>
        <button class="btn" onclick="location.reload()">إعادة المحاولة</button>
    </div>
</div>

<script>
    // بنك الأسئلة الشامل (60 سؤال)
    const quizData = [
        // Domain 1 & 2: Intro & Repositories
        { q: "What is the PRIMARY difference between a Centralized VCS (CVCS) and a Distributed VCS (DVCS)?", opts: ["CVCS is faster than DVCS for large projects", "In DVCS, clients clone the full repository including its entire history", "DVCS requires a central server to function", "CVCS supports branching, while DVCS does not"], ans: 1, exp: "DVCS clones the full history locally, allowing full offline work and removing single points of failure." },
        { q: "How does Git store data, which makes it fundamentally different from most other VCS tools?", opts: ["As a list of file-based changes (deltas)", "As compressed ZIP archives", "As a series of snapshots of the entire filesystem at each commit", "As binary diffs stored in a database"], ans: 2, exp: "Git takes a snapshot of what all your files look like at that moment and stores a reference to that snapshot." },
        { q: "What are the THREE states a file can be in within a Git project?", opts: ["Created, Edited, Deleted", "Local, Remote, Archived", "Tracked, Untracked, Ignored", "Modified, Staged, Committed"], ans: 3, exp: "Files in Git go through Modified (changed but not saved), Staged (marked for next commit), and Committed (safely stored)." },
        { q: "Which GitHub account type provides centralized management of multiple organizations with SAML SSO?", opts: ["Personal account", "Organization account", "Enterprise account", "GitHub Pro account"], ans: 2, exp: "Enterprise accounts are designed for large companies needing SAML SSO, policies, and multi-org management." },
        { q: "What is the URL structure for a repository owned by a personal GitHub account?", opts: ["github.com/org/repo", "github.com/projects/user/repo", "github.com/username/repo_name", "github.com/enterprise/user/repo"], ans: 2, exp: "Personal repositories follow the domain/username/repository format." },
        { q: "When creating a new repository, which THREE files can GitHub automatically add?", opts: ["index.html, style.css, app.js", "README, LICENSE, .gitignore", "CONTRIBUTING, CODEOWNERS, CHANGELOG", "Dockerfile, package.json, requirements.txt"], ans: 1, exp: "GitHub offers checkboxes to initialize the repo with a README, .gitignore, and a License." },
        { q: "To keep a fork synchronized with the original (upstream) repository, what is the RECOMMENDED approach?", opts: ["Delete and re-fork the repository", "Add the original repository as an 'upstream' remote, fetch, and merge", "Submit a Pull Request from the original to your fork", "Wait for GitHub to automatically sync it"], ans: 1, exp: "You must configure the upstream remote and fetch its changes to keep your fork updated." },
        { q: "Which of the following is TRUE about changing a repository's visibility from Private to Public?", opts: ["It only affects new files", "It automatically transfers ownership to an organization", "It makes the code visible to anyone, allows forking, and disables previous push rule sets", "The change is easily reversible with no consequences"], ans: 2, exp: "Making a repo public exposes everything, allows anyone to fork it, and changes how rules apply." },
        { q: "What is the maximum number of items you can pin to your GitHub profile?", opts: ["3", "6", "10", "Unlimited"], ans: 1, exp: "You can pin up to 6 repositories or gists to your public profile." },
        { q: "Which tool helps you keep your repository dependencies up to date automatically?", opts: ["CodeQL", "GitHub Copilot", "Dependabot", "GitHub Actions"], ans: 2, exp: "Dependabot scans for outdated dependencies and opens automated PRs to update them." },

        // Domain 3: Collaboration Features
        { q: "What is the PRIMARY purpose of GitHub Issues?", opts: ["To track tasks, bugs, feature requests, and work items", "To manage billing settings", "To store database records", "To configure deployment pipelines"], ans: 0, exp: "Issues are the core tracking mechanism for work in a repository." },
        { q: "Where must the CODEOWNERS file be placed for GitHub to recognize it?", opts: ["Only in the root directory", "In the root directory, .github/ folder, or docs/ folder", "In any subdirectory", "Only inside the .github/ folder"], ans: 1, exp: "GitHub looks for CODEOWNERS in root, docs/, or .github/." },
        { q: "What is a Draft Pull Request?", opts: ["A PR automatically approved by code owners", "A PR submitted by an external contributor", "A PR indicating work in progress that CANNOT be merged yet", "A PR that failed CI checks"], ans: 2, exp: "Draft PRs signal that the code is not ready for review and block merging." },
        { q: "During a Pull Request review, what does 'Request Changes' mean?", opts: ["The reviewer leaves general comments", "The reviewer approves the code", "The reviewer requests the PR be closed", "The reviewer indicates problems that MUST be fixed before merging"], ans: 3, exp: "Requesting changes places a block on merging (if branch protection is enabled) until resolved." },
        { q: "Which merge strategy gives a clean, linear commit history where each feature is represented by a SINGLE commit?", opts: ["Create a merge commit", "Rebase and merge", "Squash and merge", "Fast-forward merge"], ans: 2, exp: "Squash and merge combines all commits from the feature branch into one commit on the main branch." },
        { q: "How is GitHub Discussions DIFFERENT from GitHub Issues?", opts: ["Issues support markdown; Discussions do not", "Issues are for tracking actionable tasks/bugs; Discussions are for open-ended conversations and Q&A", "Discussions automatically create PRs", "Discussions are only for Enterprise accounts"], ans: 1, exp: "Discussions build community through Q&A, while Issues track actionable development tasks." },
        { q: "What is a GitHub 'Gist'?", opts: ["A dashboard widget", "A simple way to share code snippets; each Gist is a full Git repository", "An automated workflow template", "A type of organization repository"], ans: 1, exp: "Gists are great for sharing snippets, and underneath, every Gist is a fully functional Git repository." },
        { q: "Can a public Gist be converted to a secret Gist?", opts: ["Yes, at any time", "No; a public Gist cannot be converted to secret", "Yes, by contacting support", "No; neither type can be converted"], ans: 1, exp: "Once a Gist is public, it might have been cloned. You cannot make it secret. You must create a new secret Gist." },
        { q: "Which of the following about GitHub Wikis is TRUE?", opts: ["You can only edit them on GitHub.com", "They do not support Markdown", "Wikis are basically Git repositories and can be cloned and edited locally", "They are always public"], ans: 2, exp: "Every Wiki is a Git repository, meaning you can clone it, edit locally, and push changes." },
        { q: "Issue Forms (the newer evolution of Issue Templates) are written in which format?", opts: ["Markdown (.md)", "HTML", "JSON", "YAML"], ans: 3, exp: "Issue forms use YAML to define structured inputs like dropdowns and text boxes." },
        { q: "In a Pull Request, what does the 'Base' branch represent?", opts: ["The branch containing the new changes", "The backup branch", "The most recently created branch", "The branch you want to MERGE INTO (the target branch)"], ans: 3, exp: "You compare your changes (Compare branch) against the branch you want to update (Base branch)." },
        { q: "What happens when you 'Convert to Issue' a GitHub Discussion?", opts: ["The discussion is deleted", "The discussion is archived", "A new issue is created, and a link connects it to the original discussion", "The discussion is moved to another repo"], ans: 2, exp: "It bridges community ideation (Discussion) into an actionable development task (Issue)." },
        { q: "What are GitHub 'Saved Replies' used for?", opts: ["Automated bot responses", "Pre-written reusable text responses for replying to common comments quickly", "Scheduled messages", "AI-generated responses"], ans: 1, exp: "Saved replies save you time from typing the same response to common questions." },
        { q: "What language is used to format comments, issues, and PRs on GitHub?", opts: ["AsciiDoc", "HTML", "reStructuredText", "Markdown"], ans: 3, exp: "GitHub uses a specific flavor of Markdown (GitHub Flavored Markdown) across the entire platform." },
        
        // Domain 4: Modern Development (Actions, Codespaces, Copilot) - WEAK POINT FOCUS
        { q: "In a GitHub Actions workflow YAML file, which keyword defines WHAT EVENT triggers the workflow to run?", opts: ["jobs", "steps", "on", "runs-on"], ans: 2, exp: "The 'on:' keyword specifies the trigger, such as 'push', 'pull_request', or 'schedule'." },
        { q: "Which keyword in a GitHub Actions workflow file specifies the RUNNER environment (e.g., Ubuntu Linux)?", opts: ["uses", "on", "environment", "runs-on"], ans: 3, exp: "'runs-on' specifies the virtual machine type that will execute the job." },
        { q: "What is the MAIN difference between github.dev (the web editor) and GitHub Codespaces?", opts: ["github.dev costs money; Codespaces is free", "github.dev provides a full VM; Codespaces does not", "github.dev launches instantly with NO compute resources; Codespaces provides a full VM with terminal access", "They are exactly the same"], ans: 2, exp: "github.dev is just a lightweight editor in the browser. Codespaces runs on actual cloud hardware." },
        { q: "Which file is used to configure and customize a GitHub Codespaces environment?", opts: [".github/codespaces.yml", "devcontainer.json", "docker-compose.yml", "codespace-config.yaml"], ans: 1, exp: "Codespaces rely entirely on the '.devcontainer/devcontainer.json' configuration standard." },
        { q: "After modifying the devcontainer.json file in a running Codespace, what MUST you do?", opts: ["Push changes to remote", "Close and reopen browser", "Rebuild the container", "Restart GitHub Actions"], ans: 2, exp: "Changes to the devcontainer configuration require a rebuild for the new extensions or tools to be installed." },
        { q: "Which of the following is a feature EXCLUSIVE to GitHub Copilot Business (not in Individual)?", opts: ["Code completions", "Chat assistance", "Organization-wide policy management and Audit logs", "IDE extensions"], ans: 2, exp: "Business plans allow admins to enforce policies and review audit logs across the enterprise." },
        { q: "Which statement about GitHub Copilot's 'Telemetry' is CORRECT?", opts: ["Both plans include telemetry", "Copilot Individual INCLUDES telemetry; Copilot Business does NOT", "Neither plan includes telemetry", "Copilot Business includes telemetry; Individual does not"], ans: 1, exp: "For privacy, Copilot Business and Enterprise do not collect telemetry for model training." },
        { q: "GitHub Copilot is available for FREE to which groups?", opts: ["All Free account holders", "Enterprise administrators", "Anyone with public repos", "Verified students, teachers, and maintainers of popular open-source projects"], ans: 3, exp: "GitHub supports education and open source by granting them free access to Copilot." },
        { q: "What happens to a GitHub Codespace if you just close the browser tab?", opts: ["It is permanently deleted", "It continues running until it hits the auto-idle timeout limit, then stops", "It stops immediately", "It consumes your entire monthly billing quota"], ans: 1, exp: "Closing the tab disconnects you, but the machine runs until the idle timeout shuts it down to save money." },
        { q: "Where can you find publicly available GitHub Actions to use in your workflows?", opts: ["GitHub Private Repositories", "GitHub Actions Project Boards", "GitHub Marketplace", "GitHub Connect"], ans: 2, exp: "The Marketplace is the central hub for discovering community-built Actions and Apps." },

        // Domain 5: Project Management
        { q: "Which GitHub Projects layout best serves as a Kanban board?", opts: ["Board layout", "Table layout", "Roadmap layout", "List layout"], ans: 0, exp: "The Board layout provides columns (Todo, In Progress, Done) typical of Kanban." },
        { q: "Which GitHub Projects layout is BEST for scheduling tasks along a timeline (like Gantt charts)?", opts: ["Board view", "Table view", "Calendar view", "Roadmap view"], ans: 3, exp: "The Roadmap view visually represents tasks across a timeline." },
        { q: "What feature in GitHub Projects allows you to automatically move a card to 'Done' when its linked PR is merged?", opts: ["GitHub Actions", "Dependabot", "Project Workflows (Built-in automation)", "Milestones"], ans: 2, exp: "Projects have built-in workflow automations that do not require writing GitHub Actions." },
        { q: "What is the PRIMARY use of GitHub 'Milestones'?", opts: ["To schedule automated workflow runs", "To group issues and PRs together toward a specific goal and track completion progress", "To mark specific commits as releases", "To define code ownership"], ans: 1, exp: "Milestones track a collection of issues and provide a progress bar as they are closed." },
        { q: "Which feature enables you to effortlessly generate graphs and charts for visualizing project status?", opts: ["Pulse", "Project Insights", "Copilot Charts", "GitHub Actions"], ans: 1, exp: "Project Insights provides historical and current charts (burn-up, burn-down) for your boards." },
        { q: "What happens when you choose to close a Project?", opts: ["It is permanently deleted", "The content is retained and you have the ability to reopen it later", "Associated values and insights are deleted", "The project is moved to a separate folder"], ans: 1, exp: "Closing a project is like archiving it. GitHub rarely deletes data permanently unless you explicitly choose 'Delete'." },
        { q: "What are the use cases for labels?", opts: ["Categorizing files in the repository", "Assigning them to releases", "Assigning labels to contributors", "Categorizing issues and pull requests"], ans: 3, exp: "Labels organize and filter work items (Issues/PRs), not code files or people." },

        // Domain 6: Privacy, Security, and Administration - WEAK POINT FOCUS
        { q: "What is the minimum permission a user must have to directly push commits to a repository owned by an organization?", opts: ["Read", "Triage", "Maintain", "Write"], ans: 3, exp: "The 'Write' role is required to push code. Triage manages issues, Read only clones." },
        { q: "Who can setup billing or assign billing managers for an organization?", opts: ["Team maintainers", "Repository owners", "Owner at the organization/enterprise level", "Admins at the team level"], ans: 2, exp: "Financials are strictly controlled by the highest administrative level: Org Owners or Enterprise Owners." },
        { q: "What does GitHub's 'Branch Protection Rules' feature allow you to do?", opts: ["Prevent users from viewing a branch", "Enforce strict workflow rules (like requiring PR reviews and blocking direct pushes)", "Automatically delete old branches", "Clone a protected branch"], ans: 1, exp: "Branch protection ensures code quality by forcing reviews, status checks, and preventing force pushes." },
        { q: "What does Two-Factor Authentication (2FA) protect against in GitHub?", opts: ["SQL injection attacks", "Accidental deletion of branches", "Automated bot activity", "Unauthorized access even if the password is stolen, by requiring a second device"], ans: 3, exp: "2FA ensures that a stolen password alone is not enough to compromise your account." },
        { q: "Which of the following are valid 2FA methods supported by GitHub?", opts: ["Email, SMS, Phone call", "GitHub Mobile, TOTP Apps, Security Keys, SMS", "Fingerprint scanner, Email", "Only Security Keys"], ans: 1, exp: "Email is NOT a valid 2FA method on GitHub. You must use Mobile, an App, SMS, or a hardware key." },
        { q: "What should you do with GitHub 2FA Recovery Codes once generated?", opts: ["Store them securely OFFLINE (they are the only way to recover access if you lose your device)", "Save them in the README file", "Share them with team members", "Nothing, GitHub backs them up"], ans: 0, exp: "If you lose your device AND your recovery codes, you permanently lose access to your account." },
        { q: "What does Dependabot do in GitHub?", opts: ["It alerts you about security vulnerabilities in your dependencies and auto-creates PRs to update them", "It auto-merges PRs without review", "It scans for hardcoded passwords", "It blocks external contributors"], ans: 0, exp: "Dependabot handles supply-chain security by keeping your packages (dependencies) up to date." },
        { q: "What is the purpose of 'Secret Scanning' in GitHub?", opts: ["To encrypt sensitive files", "To hide repository contents", "To detect and alert when sensitive data (tokens, API keys, passwords) are accidentally pushed", "To scan for performance bottlenecks"], ans: 2, exp: "Secret scanning checks your code for known token formats and prevents them from being compromised." },
        { q: "What is 'CodeQL'?", opts: ["A code formatting tool", "A text editor", "A semantic code analysis engine used to find complex security vulnerabilities", "A version control system"], ans: 2, exp: "CodeQL treats your code like a database to query it for logical security vulnerabilities." },
        { q: "What is a GitHub 'Security Policy' (SECURITY.md)?", opts: ["An automated vulnerability scanner", "A configuration file for branch rules", "A Markdown file that guides users on how to properly and securely report vulnerabilities in your project", "A file that defines write access"], ans: 2, exp: "SECURITY.md provides the instructions for responsible disclosure so researchers don't open public issues for zero-days." },
        { q: "What does 'Enterprise Managed Users (EMUs)' allow an organization to do?", opts: ["Manage user account lifecycles and authentication entirely through an external Identity Provider (like Azure AD or Okta)", "Create unlimited free private repos", "Bypass 2FA requirements", "Allow external developers to join automatically"], ans: 0, exp: "EMUs give enterprises total control over their developers' accounts via SSO." },
        { q: "What are 'Internal' repositories in GitHub Enterprise Cloud?", opts: ["Repos visible only to the owner", "Repos accessible to ALL members of the enterprise but hidden from the outside world", "Repos archived after 30 days", "Repos for GitHub Actions only"], ans: 1, exp: "Internal repositories are the foundation of InnerSource; visible to the whole company, invisible to the public." },
        { q: "What are the different repository visibility options available in an Enterprise?", opts: ["Private and Public", "Personal and Public", "Private, Public, and Internal", "Shared, Private, Public"], ans: 2, exp: "Enterprises get a third visibility option: 'Internal', which is restricted to enterprise members." },

        // Domain 7: Benefits of the GitHub Community
        { q: "What is 'InnerSource'?", opts: ["GitHub's internal codebase", "A strategy that adopts open-source best practices (collaboration, transparency) but applied to PROPRIETARY software within an organization", "A type of paid repository", "A tool for internal documentation"], ans: 1, exp: "InnerSource breaks down company silos by letting internal teams contribute to each other's code like open source." },
        { q: "What is the PRIMARY purpose of GitHub Sponsors?", opts: ["To display ads in repositories", "To fund GitHub's infrastructure", "To enable developers and organizations to receive financial donations to support their open-source projects", "To sponsor GitHub events"], ans: 2, exp: "GitHub Sponsors provides a direct way for the community to financially support open-source maintainers." },
        { q: "What is the PRIMARY purpose of the GitHub Marketplace?", opts: ["To sell developer hardware", "A job board for hiring", "A platform for selling private code", "A destination for discovering and installing apps and actions that integrate with GitHub"], ans: 3, exp: "The Marketplace is where you find tools to extend GitHub's functionality." },
        { q: "A popular open-source project is abandoned by its original maintainer. How can the community ensure it continues?", opts: ["Ask GitHub to transfer ownership", "Fork the repository; the fork can become the new primary maintained version", "The project is locked forever", "Buy it from the Marketplace"], ans: 1, exp: "Forking allows the community to take the code, build on it, and create a new central hub for the project." },
        { q: "What does the 'GitHub Connect' feature allow?", opts: ["Connects GitHub Mobile to Desktop", "Enables Actions to run locally", "Allows GitHub Enterprise SERVER (on-premise) to connect to github.com cloud services to share features", "Connects Codespaces to external clouds"], ans: 2, exp: "Connect bridges self-hosted Enterprise Server instances with the cloud to utilize features like Dependabot." },
        { q: "Which statement best describes the difference between cloning and forking?", opts: ["Cloning transfers ownership, forking does not", "Only private repos can be forked", "Forking creates a copy under your GitHub account; cloning creates a local copy on your computer", "When you clone, changes push directly to the original"], ans: 2, exp: "Forking is a GitHub platform feature (cloud copy). Cloning is a Git command line feature (local copy)." }
    ];

    let currentQuestion = 0;
    let score = 0;
    let selectedOption = null;
    let answered = false;

    const questionCountEl = document.getElementById('question-count');
    const questionTextEl = document.getElementById('question-text');
    const optionsEl = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const explanationEl = document.getElementById('explanation');
    const progressEl = document.getElementById('progress');

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        selectedOption = null;
        explanationEl.style.display = 'none';
        nextBtn.innerText = "تأكيد الإجابة";
        nextBtn.disabled = true;

        const q = quizData[currentQuestion];
        questionCountEl.innerText = `السؤال ${currentQuestion + 1} من ${quizData.length}`;
        questionTextEl.innerText = q.q;
        progressEl.style.width = `${((currentQuestion) / quizData.length) * 100}%`;

        optionsEl.innerHTML = '';
        q.opts.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(div, index);
            optionsEl.appendChild(div);
        });
    }

    function selectOption(element, index) {
        if (answered) return;
        
        document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        selectedOption = index;
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        if (!answered) {
            // Check Answer
            answered = true;
            const q = quizData[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            if (selectedOption === q.ans) {
                options[selectedOption].classList.add('correct');
                score++;
            } else {
                options[selectedOption].classList.add('wrong');
                options[q.ans].classList.add('correct');
            }

            explanationEl.innerHTML = `<strong>Explanation:</strong> ${q.exp}`;
            explanationEl.style.display = 'block';
            
            nextBtn.innerText = currentQuestion === quizData.length - 1 ? "إظهار النتيجة" : "السؤال التالي";
        } else {
            // Move to next
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        const resultContainer = document.getElementById('result-container');
        resultContainer.style.display = 'block';
        
        const percentage = Math.round((score / quizData.length) * 100);
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('result-message');
        
        scoreEl.innerText = `${percentage}% (${score} / ${quizData.length})`;
        
        if (percentage >= 70) {
            scoreEl.className = 'score pass';
            msgEl.innerText = "ألف مبروك! لقد اجتزت التحدي بدرجة النجاح المطلوبة لشهادة GitHub Foundations. أنت جاهز لـ 'التفليل'!";
        } else {
            scoreEl.className = 'score fail';
            msgEl.innerText = "نتيجة جيدة، لكن تحتاج إلى مراجعة بعض المفاهيم، خاصة في إعدادات الأمان والفواتير. أعد المحاولة!";
        }
    }
</script>

</body>
</html>
